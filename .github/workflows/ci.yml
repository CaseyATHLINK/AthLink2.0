name: CI
on:
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json "packageManager" — do not also set it here.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --no-frozen-lockfile
      # Production build of the shell — surfaces JSX/import errors (incl. most TDZ).
      - run: pnpm --filter @athlink/web build
      # Static safety net the bundler can't provide: fails on undefined references
      # (→ runtime ReferenceError) and imports of non-exported names (→ silently
      # undefined) across the decomposed sailing modules + feature packages.
      # See sports/sailing/src/README.md. Manual run: node tools/check-modules.mjs
      - run: node tools/check-modules.mjs

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Python syntax check
        run: |
          # Recurse: backend now lives in api/_shared + api/sailing as well as api/ root.
          for f in $(find api -name '*.py' -not -path '*/__pycache__/*'); do python3 -c "import ast,sys; ast.parse(open('$f').read())"; done
      - name: Parser regression vs baseline
        run: |
          pip install -r requirements.txt || true
          python3 tools/test_parser.py --diff
